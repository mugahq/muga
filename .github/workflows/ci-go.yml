name: CI – Go CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/ci-go.yml"
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/ci-go.yml"

defaults:
  run:
    working-directory: cli

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4
          working-directory: cli

      - name: go vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold (90%)
        run: |
          grep -v '/cmd/muga/' coverage.out > coverage-filtered.out
          COVERAGE=$(go tool cover -func=coverage-filtered.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          awk "BEGIN {if ($COVERAGE < 90) {print \"FAIL: coverage \" $COVERAGE \"% < 90%\"; exit 1} else {print \"OK: coverage \" $COVERAGE \"%\"}}"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build binary
        run: go build -ldflags "-X main.version=ci" -o bin/muga ./cmd/muga

      - name: Smoke test
        run: |
          ./bin/muga --version
          ./bin/muga --help
